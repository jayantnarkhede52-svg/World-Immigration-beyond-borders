<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | World Immigration Beyond Borders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #1e2130;
            --bg-hover: #262a3a;
            --border: #2a2e3f;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0b0;
            --text-muted: #6b7280;
            --accent: #e87b37;
            --accent-light: #f09d5f;
            --accent-glow: rgba(232, 123, 55, 0.15);
            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.1);
            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.1);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --info: #3b82f6;
            --info-bg: rgba(59, 130, 246, 0.1);
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ============ LOGIN SCREEN ============ */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at top, #1a1d2780, var(--bg-primary));
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .login-card .logo { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .login-card .logo span { color: var(--accent); }
        .login-card .subtitle { color: var(--text-secondary); margin-bottom: 32px; font-size: 0.9rem; }

        .login-card input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-card input:focus { border-color: var(--accent); }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .login-card button:hover { opacity: 0.9; }
        .login-card button:active { transform: scale(0.98); }

        .login-error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: none;
        }

        /* ============ DASHBOARD LAYOUT ============ */
        .dashboard { display: none; }

        .topbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar-left h1 { font-size: 1.2rem; font-weight: 600; }
        .topbar-left h1 span { color: var(--accent); }

        .topbar-right { display: flex; align-items: center; gap: 16px; }

        .btn-logout {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        .btn-refresh {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

        .main-content { padding: 32px; max-width: 1400px; margin: 0 auto; }

        /* ============ STATS CARDS ============ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

        .stat-card .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .stat-card .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stat-card .stat-icon.orange { background: var(--accent-glow); color: var(--accent); }
        .stat-card .stat-icon.green { background: var(--success-bg); color: var(--success); }
        .stat-card .stat-icon.blue { background: var(--info-bg); color: var(--info); }
        .stat-card .stat-icon.yellow { background: var(--warning-bg); color: var(--warning); }

        .stat-card .stat-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-card .stat-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

        /* ============ DATA TABLE ============ */
        .table-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .table-header h3 { font-size: 1.05rem; font-weight: 600; }

        .table-filters {
            display: flex;
            gap: 8px;
        }
        .filter-btn {
            padding: 6px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .table-wrapper { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 14px 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        td {
            padding: 16px 20px;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        tr:hover td { background: var(--bg-hover); }
        td.name { color: var(--text-primary); font-weight: 500; }

        /* Status badges */
        .badge-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
            text-transform: capitalize;
        }
        .badge-status.new { background: var(--info-bg); color: var(--info); }
        .badge-status.contacted { background: var(--warning-bg); color: var(--warning); }
        .badge-status.converted { background: var(--success-bg); color: var(--success); }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* Action buttons */
        .action-btns { display: flex; gap: 6px; }
        .btn-action {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); }
        .btn-action.danger:hover { border-color: var(--danger); color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state i { margin-bottom: 16px; opacity: 0.3; }
        .empty-state p { font-size: 0.95rem; }

        /* ============ TOAST ============ */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--danger); color: #fff; }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .topbar { padding: 12px 16px; }
            .main-content { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-card .stat-value { font-size: 1.5rem; }
            td, th { padding: 10px 12px; font-size: 0.82rem; }
            .table-header { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen" class="login-screen">
    <div class="login-card">
        <div class="logo">WI<span>BB</span></div>
        <p class="subtitle">Admin Dashboard</p>
        <p id="login-error" class="login-error"></p>
        <form id="login-form">
            <input type="password" id="login-password" placeholder="Enter admin password" autocomplete="current-password" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</div>

<!-- ============ DASHBOARD ============ -->
<div id="dashboard" class="dashboard">
    <div class="topbar">
        <div class="topbar-left">
            <h1>WI<span>BB</span> Admin</h1>
        </div>
        <div class="topbar-right">
            <button class="btn-refresh" onclick="refreshAll()">
                <i data-lucide="refresh-cw" style="width:14px;height:14px;"></i>
                Refresh
            </button>
            <button class="btn-logout" onclick="logout()">
                <i data-lucide="log-out" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;"></i>
                Logout
            </button>
        </div>
    </div>

    <div class="main-content">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <p class="stat-label">Total Leads</p>
                        <p class="stat-value" id="stat-total">—</p>
                    </div>
                    <div class="stat-icon orange"><i data-lucide="users" style="width:22px;height:22px;"></i></div>
                </div>
                <p class="stat-sub"><span id="stat-today">0</span> today</p>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <p class="stat-label">New Leads</p>
                        <p class="stat-value" id="stat-new">—</p>
                    </div>
                    <div class="stat-icon blue"><i data-lucide="bell" style="width:22px;height:22px;"></i></div>
                </div>
                <p class="stat-sub">Awaiting follow-up</p>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <p class="stat-label">Contacted</p>
                        <p class="stat-value" id="stat-contacted">—</p>
                    </div>
                    <div class="stat-icon yellow"><i data-lucide="phone-call" style="width:22px;height:22px;"></i></div>
                </div>
                <p class="stat-sub">In follow-up pipeline</p>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <p class="stat-label">Converted</p>
                        <p class="stat-value" id="stat-converted">—</p>
                    </div>
                    <div class="stat-icon green"><i data-lucide="check-circle-2" style="width:22px;height:22px;"></i></div>
                </div>
                <p class="stat-sub">Successful conversions</p>
            </div>
        </div>

        <!-- Leads Table -->
        <div class="table-card">
            <div class="table-header">
                <h3>All Leads</h3>
                <div class="table-filters">
                    <button class="filter-btn active" onclick="filterLeads('all', this)">All</button>
                    <button class="filter-btn" onclick="filterLeads('new', this)">New</button>
                    <button class="filter-btn" onclick="filterLeads('contacted', this)">Contacted</button>
                    <button class="filter-btn" onclick="filterLeads('converted', this)">Converted</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Visa Interest</th>
                            <th>Message</th>
                            <th>Source</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leads-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div id="toast" class="toast"></div>

<script>
    // ============ SUPABASE CONFIG ============
    const SUPABASE_URL = 'https://anmwlzneyiynauoebpbf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubXdsem5leWl5bmF1b2VicGJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzIxNTIsImV4cCI6MjA5MDIwODE1Mn0.nqRukK_X-jMlKWTHDKV9REvFstKKg5-ylTzaUSaP4HI';
    const ADMIN_PASSWORD = 'admin123';

    // ============ LOGIN ============
    const loginScreen = document.getElementById('login-screen');
    const dashboard = document.getElementById('dashboard');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');

    // Auto-login if session exists
    if (localStorage.getItem('wibb_admin_logged_in') === 'true') {
        showDashboard();
    }

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const password = document.getElementById('login-password').value;

        if (password === ADMIN_PASSWORD) {
            localStorage.setItem('wibb_admin_logged_in', 'true');
            showDashboard();
        } else {
            loginError.textContent = 'Invalid password';
            loginError.style.display = 'block';
        }
    });

    function showDashboard() {
        loginScreen.style.display = 'none';
        dashboard.style.display = 'block';
        lucide.createIcons();
        refreshAll();
    }

    function logout() {
        localStorage.removeItem('wibb_admin_logged_in');
        dashboard.style.display = 'none';
        loginScreen.style.display = 'flex';
        document.getElementById('login-password').value = '';
        loginError.style.display = 'none';
    }

    // ============ SUPABASE API HELPERS ============
    const headers = {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
    };

    async function supabaseGet(table, query = '') {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}&order=created_at.desc`, { headers });
        return res.json();
    }

    async function supabasePatch(table, id, data) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
            method: 'PATCH',
            headers: { ...headers, 'Prefer': 'return=minimal' },
            body: JSON.stringify(data)
        });
        return res.ok;
    }

    async function supabaseDelete(table, id) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
            method: 'DELETE',
            headers
        });
        return res.ok;
    }

    // ============ LOAD DATA ============
    let allLeads = [];

    async function refreshAll() {
        await loadLeads('all');
    }

    async function loadLeads(filter = 'all') {
        try {
            let query = 'select=*';
            if (filter !== 'all') {
                query += `&status=eq.${filter}`;
            }

            const leads = await supabaseGet('leads', query);
            allLeads = leads;
            renderLeads(leads);
            updateStats(leads, filter === 'all' ? leads : null);
        } catch (err) {
            console.error('Failed to load leads:', err);
        }
    }

    function updateStats(displayedLeads, allLeadsData) {
        const data = allLeadsData || allLeads;
        const today = new Date().toDateString();

        const total = data.length;
        const newCount = data.filter(l => l.status === 'new').length;
        const contactedCount = data.filter(l => l.status === 'contacted').length;
        const convertedCount = data.filter(l => l.status === 'converted').length;
        const todayCount = data.filter(l => new Date(l.created_at).toDateString() === today).length;

        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-new').textContent = newCount;
        document.getElementById('stat-contacted').textContent = contactedCount;
        document.getElementById('stat-converted').textContent = convertedCount;
        document.getElementById('stat-today').textContent = todayCount;
    }

    function renderLeads(leads) {
        const tbody = document.getElementById('leads-tbody');

        if (!leads || leads.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><p>No leads found</p></div></td></tr>`;
            return;
        }

        tbody.innerHTML = leads.map(lead => `
            <tr>
                <td class="name">${escHtml(lead.name)}</td>
                <td><a href="tel:${escHtml(lead.phone)}" style="color:var(--accent);text-decoration:none;">${escHtml(lead.phone)}</a></td>
                <td>${escHtml(lead.visa_interest || '—')}</td>
                <td title="${escHtml(lead.message || '')}">${escHtml(lead.message || '—')}</td>
                <td>${escHtml(lead.source_page || '—')}</td>
                <td><span class="badge-status ${lead.status}"><span class="badge-dot"></span>${lead.status}</span></td>
                <td>${formatDate(lead.created_at)}</td>
                <td>
                    <div class="action-btns">
                        ${lead.status === 'new' ? `<button class="btn-action" onclick="updateStatus('${lead.id}','contacted')">Contacted</button>` : ''}
                        ${lead.status === 'contacted' ? `<button class="btn-action" onclick="updateStatus('${lead.id}','converted')">Convert</button>` : ''}
                        <button class="btn-action danger" onclick="deleteLead('${lead.id}')">Delete</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // ============ ACTIONS ============
    async function updateStatus(id, status) {
        const success = await supabasePatch('leads', id, { status });
        if (success) {
            showToast('Lead updated!', 'success');
            refreshAll();
        } else {
            showToast('Update failed', 'error');
        }
    }

    async function deleteLead(id) {
        if (!confirm('Delete this lead?')) return;
        const success = await supabaseDelete('leads', id);
        if (success) {
            showToast('Lead deleted', 'success');
            refreshAll();
        } else {
            showToast('Delete failed', 'error');
        }
    }

    function filterLeads(filter, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        loadLeads(filter);
    }

    // ============ UTILS ============
    function escHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) +
               ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type} show`;
        setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }
</script>
</body>
</html>
